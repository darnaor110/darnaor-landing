<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>תודה! | דר נאור — חטובים לנצח</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;600;700;800&display=swap" rel="stylesheet">

  <style>
    /* ── Design tokens ── */
    :root {
      --bg:      #071419;
      --bg2:     #0b1e26;
      --accent:  #5bd4ff;
      --accent2: #087fa3;
      --text:    #e2edf2;
      --muted:   #8aa4af;
      --border:  rgba(8,127,163,0.3);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Assistant', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.2rem;
      overflow-x: hidden;
    }

    /* ── Card container ── */
    .card {
      width: 100%;
      max-width: 520px;
      background: var(--bg2);
      border: 1.5px solid var(--border);
      border-radius: 20px;
      padding: 2.5rem 2rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2rem;
      box-shadow: 0 0 40px rgba(8,127,163,0.12);
      animation: fadeUp 0.5s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Checkmark icon ── */
    .check-circle {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      background: rgba(8,127,163,0.15);
      border: 2px solid var(--accent2);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 30px rgba(8,127,163,0.3);
      flex-shrink: 0;
    }

    .check-circle svg {
      width: 36px;
      height: 36px;
    }

    /* ── Text ── */
    h1 {
      font-size: clamp(1.6rem, 5vw, 2.2rem);
      font-weight: 800;
      text-align: center;
      color: var(--text);
      line-height: 1.3;
    }

    .subtitle {
      font-size: 1rem;
      color: var(--muted);
      text-align: center;
      line-height: 1.7;
    }

    /* ── Divider ── */
    .divider {
      width: 60px;
      height: 3px;
      background: var(--accent2);
      border-radius: 2px;
    }

    /* ── Video placeholder ── */
    .video-placeholder {
      width: 100%;
      aspect-ratio: 16/9;
      border-radius: 14px;
      border: 1.5px dashed var(--border);
      background: rgba(8,127,163,0.04);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      color: var(--muted);
      font-size: 0.85rem;
      font-weight: 600;
    }

    .video-placeholder svg {
      width: 48px;
      height: 48px;
      opacity: 0.45;
    }

    /* ── Instagram button ── */
    .ig-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      padding: 1rem 1.5rem;
      border-radius: 14px;
      border: none;
      cursor: pointer;
      font-family: 'Assistant', sans-serif;
      font-size: 1.1rem;
      font-weight: 800;
      color: #fff;
      text-decoration: none;
      background: linear-gradient(135deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%);
      box-shadow: 0 4px 20px rgba(220,39,67,0.35);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .ig-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 28px rgba(220,39,67,0.5);
    }

    .ig-btn:active {
      transform: scale(0.97);
    }

    .ig-btn svg {
      width: 24px;
      height: 24px;
      flex-shrink: 0;
    }

    /* ── Back link ── */
    .back-link {
      font-size: 0.85rem;
      color: var(--muted);
      text-decoration: none;
      transition: color 0.2s;
    }

    .back-link:hover {
      color: var(--accent);
    }
  </style>
</head>

<body>
  <div class="card">

    <!-- Checkmark -->
    <div class="check-circle">
      <svg viewBox="0 0 24 24" fill="none" stroke="#5bd4ff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="20 6 9 17 4 12"/>
      </svg>
    </div>

    <!-- Headline -->
    <div style="display:flex; flex-direction:column; align-items:center; gap:0.75rem;">
      <h1>הפרטים התקבלו!</h1>
      <div class="divider"></div>
      <p class="subtitle">
        תודה שפנית. אחזור אליך בהקדם לבדוק אם אנחנו מתאימים.<br>
        בינתיים — בוא נכיר קצת יותר ☀️
      </p>
    </div>

    <!-- Video placeholder — להחליף בהטמעה אמיתית כשיש סרטון -->
    <div class="video-placeholder">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <rect x="2" y="3" width="20" height="14" rx="2"/>
        <path d="M10 8l5 3-5 3V8z" fill="currentColor" stroke="none"/>
        <path d="M8 21h8M12 17v4"/>
      </svg>
      <span>כאן יופיע סרטון בקרוב</span>
    </div>

    <!-- Instagram CTA -->
    <a href="https://www.instagram.com/dar__naor" target="_blank" rel="noopener" class="ig-btn">
      <!-- Instagram icon -->
      <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <rect x="2" y="2" width="20" height="20" rx="5"/>
        <circle cx="12" cy="12" r="4"/>
        <circle cx="17.5" cy="6.5" r="0.8" fill="#fff" stroke="none"/>
      </svg>
      עקבו אחרי באינסטגרם
    </a>

    <!-- Back link -->
    <a href="index.html" class="back-link">← חזרה לדף הבית</a>

  </div>
</body>
</html>
