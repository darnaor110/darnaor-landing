<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>תודה רבה - דר נאור</title>
  <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Assistant', sans-serif;
      background-color: #0c0e0f;
      color: #e2e2e3;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      text-align: center;
      max-width: 600px;
      background: rgba(8, 127, 163, 0.05);
      border: 1.5px solid rgba(8, 127, 163, 0.3);
      border-radius: 20px;
      padding: 40px 30px;
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 20px;
      color: #5bd4ff;
    }

    p {
      font-size: 1.1rem;
      line-height: 1.8;
      margin-bottom: 30px;
      color: #9abaca;
    }

    .checkmark {
      font-size: 4rem;
      margin-bottom: 20px;
    }

    a {
      display: inline-block;
      background: #087fa3;
      color: white;
      padding: 12px 30px;
      border-radius: 10px;
      text-decoration: none;
      font-weight: bold;
      transition: background 0.3s;
    }

    a:hover {
      background: #0a9bc4;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="checkmark">✓</div>
    <h1>תודה רבה!</h1>
    <p>
      הטופס שלך התקבל בהצלחה. אני אצור איתך קשר עד יום העסקים הבא בשביל לקיים שיחת התאמה.
    </p>
    <p style="font-size: 0.95rem; color: #8aa4af;">
      בזמן ההמתנה, אתה יכול להשתמש בוואצפ כדי להתקשר אלי
    </p>
    <a href="/">חזור לעמוד הבית</a>
  </div>
</body>
</html>
